# Basic Site Settings
locale         : "en-US"
title          : "Yifei Luo's Webpage"
title_separator: "-"
name           : "Yifei Luo"
description    : "Hi! I study and work on economics, in particular cultural economics, institutions, and history, often using models to understand places where data does not go far."
url            : "https://yifeiluo.github.io"
baseurl        : ""  # No trailing slash
repository     : "yifeiluo/yifeiluo.github.io"
theme          : "minimal-mistakes-jekyll"

# Author Information (shown in sidebar)
author:
  avatar   : "profile.png"  # Place inside /images or root
  name     : "Yifei Luo"
  pronouns : "he/him/his"
  bio      : "I study cultural economics, institutions, and historical development using formal models and empirical methods."
  location : "Toulouse, France"
  employer : "Toulouse School of Economics"
  email    : "luoyifei426@gmail.com"

  # Academic profiles
  googlescholar : "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  orcid         : "https://orcid.org/0000-0000-0000-0000"  # Replace with your actual ORCID
  pubmed        : ""  # Likely not needed unless you're in biomedical fields

  # Code and repos
  github : "yifeiluo"

  # Social media (remove unused)
  linkedin : "your-linkedin"  # replace or remove
  twitter  : "yourhandle"     # without the @, or remove
  bluesky  : ""                # remove if unused

# Publication Categories (used in _publications/)
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# Site Options
teaser           :  # Optional fallback image in /images/
breadcrumbs      : true
words_per_minute : 160
future           : true
read_more        : "disabled"
talkmap_link     : false

# Comments (optional)
comments:
  provider: false

# Atom feed
atom_feed:
  hide: false

# SEO and verification
google_site_verification :
bing_site_verification   :
yandex_site_verification :

# Social Sharing
twitter:
  username: "yourhandle"  # remove if not used
facebook:
  app_id    :
  publisher :
og_image: ""  # Set if you want a default social preview image

social:
  type : Person
  name : "Yifei Luo"
  links:
    - "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
    - "https://github.com/yifeiluo"
    - "https://orcid.org/0000-0000-0000-0000"

# Analytics (optional)
analytics:
  provider: "false"  # or "google-analytics-4"
  google:
    tracking_id: ""  # Your GA4 ID here

# Reading Files
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-*"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/vendor
  - Dockerfile
  - Gemfile
  - LICENSE
  - node_modules
  - README
  - tmp
  - vendor

keep_files:
  - .git

# Markdown and Output Settings
encoding       : "utf-8"
markdown_ext   : "markdown,mkdown,mkdn,mkd,md"
markdown       : kramdown
highlighter    : rouge
excerpt_separator: "\n\n"
incremental    : false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults for content types
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Permalinks
permalink: /:categories/:title/
timezone : Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Tag and Category Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
